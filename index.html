<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RatuAyu Pricelist</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Animasi transisi smooth saat pindah halaman */
        .page {
            transition: opacity 0.3s ease-in-out;
        }
        .hidden-page {
            display: none;
            opacity: 0;
        }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 font-sans antialiased">

    <div id="home-page" class="page min-h-screen flex flex-col justify-center items-center px-4 py-12">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-serif tracking-widest text-amber-800 uppercase">RatuAyu</h1>
            <p class="text-xs tracking-wider text-stone-500 italic mt-1">by Fairuzqa</p>
            <div class="w-12 h-[1px] bg-amber-700 mx-auto mt-4"></div>
            <p class="text-sm text-stone-600 mt-3 font-light">Silakan pilih kategori layanan kami:</p>
        </div>

        <div class="w-full max-w-md space-y-4">
            <button onclick="showCategory('wedding')" class="w-full bg-white border border-stone-200 hover:border-amber-700 py-4 px-6 rounded-xl shadow-xs text-left font-medium tracking-wide transition duration-300 flex justify-between items-center group">
                <span>Wedding Pricelist 2026</span>
                <span class="text-stone-400 group-hover:text-amber-700 transition">➔</span>
            </button>

            <button onclick="showCategory('engagement')" class="w-full bg-white border border-stone-200 hover:border-amber-700 py-4 px-6 rounded-xl shadow-xs text-left font-medium tracking-wide transition duration-300 flex justify-between items-center group">
                <span>Engagement & Pre-Wedding</span>
                <span class="text-stone-400 group-hover:text-amber-700 transition">➔</span>
            </button>

            <button onclick="showCategory('reguler-owner')" class="w-full bg-white border border-stone-200 hover:border-amber-700 py-4 px-6 rounded-xl shadow-xs text-left font-medium tracking-wide transition duration-300 flex justify-between items-center group">
                <span>Regular & Graduation (by Owner)</span>
                <span class="text-stone-400 group-hover:text-amber-700 transition">➔</span>
            </button>

            <button onclick="showCategory('reguler-team')" class="w-full bg-white border border-stone-200 hover:border-amber-700 py-4 px-6 rounded-xl shadow-xs text-left font-medium tracking-wide transition duration-300 flex justify-between items-center group">
                <span>Regular Makeup (by Team)</span>
                <span class="text-stone-400 group-hover:text-amber-700 transition">➔</span>
            </button>
        </div>
        
        <p class="text-xs text-stone-400 mt-16">© 2026 RatuAyu. All Rights Reserved.</p>
    </div>


    <div id="detail-page" class="page hidden-page min-h-screen bg-white">
        <div class="sticky top-0 bg-white/90 backdrop-blur-md border-b border-stone-100 px-4 py-4 flex items-center justify-between z-50 shadow-xs">
            <button onclick="goBack()" class="flex items-center space-x-2 text-stone-600 hover:text-amber-800 font-medium transition text-sm">
                <span>xl;</span> <span>Kembali</span>
            </button>
            <h2 id="category-title" class="text-sm font-serif uppercase tracking-widest text-stone-700">Pricelist</h2>
            <div class="w-10"></div> </div>

        <div class="max-w-xl mx-auto px-2 py-4 space-y-4" id="image-container">
            </div>
    </div>

    <script>
        // Data peta gambar untuk setiap kategori.
        // Silakan sesuaikan nama file gambar Anda di dalam folder assets/
        const pricelistData = {
            'wedding': {
                title: 'Wedding Pricelist 2026',
                images: ['assets/wedding-1.jpg', 'assets/wedding-2.jpg', 'assets/wedding-3.jpg', 'assets/wedding-4.jpg', 'assets/wedding-5.jpg', 'assets/wedding-6.jpg'] 
            },
            'engagement': {
                title: 'Engagement & Pre-Wedding',
                images: ['assets/engagement-1.jpg', 'assets/engagement-2.jpg', 'assets/engagement-3.jpg', 'assets/engagement-4.jpg', 'assets/engagement-5.jpg']
            },
            'reguler-owner': {
                title: 'Regular & Graduation (Owner)',
                images: ['assets/reguler-owner-1.jpg', 'assets/reguler-owner-2.jpg', 'assets/reguler-owner-3.jpg', 'assets/reguler-owner-4.jpg']
            },
            'reguler-team': {
                title: 'Regular Makeup (Team)',
                images: ['assets/reguler-team-1.jpg', 'assets/reguler-team-2.jpg', 'assets/reguler-team-3.jpg', 'assets/reguler-team-4.jpg', 'assets/reguler-team-5.jpg']
            }
        };

        // Fungsi saat kategori diklik
        function showCategory(categoryKey) {
            const data = pricelistData[categoryKey];
            if (!data) return;

            // 1. Atur judul di header atas
            document.getElementById('category-title').innerText = data.title;

            // 2. Bersihkan kontainer gambar lama & masukkan gambar baru
            const container = document.getElementById('image-container');
            container.innerHTML = '';
            
            data.images.forEach(imageSrc => {
                const img = document.createElement('img');
                img.src = imageSrc;
                img.alt = data.title;
                img.className = "w-full h-auto rounded-lg shadow-sm border border-stone-100";
                // Mengatasi error jika gambar belum di-upload/salah nama file
                img.onerror = function() {
                    this.style.display = 'none';
                    console.log("Gagal memuat gambar: " + imageSrc);
                };
                container.appendChild(img);
            });

            // 3. Sembunyikan halaman utama, tampilkan halaman detail
            document.getElementById('home-page').classList.add('hidden-page');
            document.getElementById('detail-page').classList.remove('hidden-page');
            
            // Scroll otomatis ke bagian paling atas halaman
            window.scrollTo({ top: 0, behavior: 'instant' });
        }

        // Fungsi tombol "Kembali"
        function goBack() {
            document.getElementById('detail-page').classList.add('hidden-page');
            document.getElementById('home-page').classList.remove('hidden-page');
        }
    </script>
</body>
</html>
